[alembic]
# Папка с миграциями и env.py.
script_location = alembic

# URL НЕ прописываем здесь — он подставляется в env.py из настроек (.env).
# Оставляем пустым, чтобы секреты не лежали в ini.
sqlalchemy.url =

# Шаблон имени файлов ревизий: дата + slug для читаемой истории.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Часовой пояс для меток времени в именах ревизий.
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
